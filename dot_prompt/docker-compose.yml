services:
  dot-prompt:
    build:
      context: .
      dockerfile: Dockerfile
    image: dot-prompt:production
    container_name: dot-prompt-server
    restart: unless-stopped
    ports:
      - "${PROMPT_SERVER_PORT:-4000}:4000"
    volumes:
      - "${PROMPT_DIR_HOST:-./prompts}:/app/prompts:ro"
    environment:
      - MIX_ENV=dev
      - PORT=4000
      - PROMPTS_DIR=/app/prompts
      - PHX_HOST=${PHX_HOST:-localhost}
      # In dev, Phoenix uses defaults from config/dev.exs
      # but we keep these as optional overrides
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-}
      - LIVE_VIEW_SIGNING_SALT=${LIVE_VIEW_SIGNING_SALT:-}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
